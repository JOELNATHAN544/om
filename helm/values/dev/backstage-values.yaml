# Backstage Helm Values
# Upstream Chart: https://github.com/backstage/charts

backstage:
  image:
    registry: k3d-om-registry:5000
    repository: om-backstage
    tag: local
    pullPolicy: Always

  appConfig:
    app:
      baseUrl: https://portal.example.com
    backend:
      baseUrl: https://portal.example.com
      cors:
        origin: https://portal.example.com
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: backstage-postgresql
          port: 5432
          user: postgres
          password: ${POSTGRES_PASSWORD}
          database: backstage
      # Keep local cache in-memory unless you deploy Redis
      cache:
        store: memory
    auth:
      environment: production
      providers:
        google:
          production:
            clientId: ${GOOGLE_CLIENT_ID}
            clientSecret: ${GOOGLE_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: emailMatchingUserEntityProfileEmail
                - resolver: emailLocalPartMatchingUserEntityName
        guest:
          userEntityRef: user:default/guest

    # Needed for reading catalog entities and templates from GitHub URLs, and for the GitHub discovery provider.
    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location, Group, User, Template]

      # Discover `catalog-info.yaml` across your GitHub org
      providers:
        github:
          om-platform:
            organization: ${GITHUB_ORG}
            catalogPath: '/catalog-info.yaml'
            filters:
              repository: '.*'
            schedule:
              frequency: { minutes: 30 }
              timeout: { minutes: 3 }

      # Bootstrap users + templates from this repo (adjust org/repo + branch)
      locations:
        - type: url
          target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/main/platform/portal/backstage/catalog/users.yaml
          rules:
            - allow: [Group, User]
        - type: url
          target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/main/platform/portal/backstage/catalog-info.yaml
          rules:
            - allow: [Component, Group, User]
        - type: github-discovery
          target: https://github.com/${GITHUB_ORG}/*/blob/main/catalog-info.yaml

  extraEnvVars:
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-postgresql
          key: postgres-password
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_TOKEN
    - name: GITHUB_ORG
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_ORG
    - name: GITHUB_REPO
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_REPO
    - name: GOOGLE_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GOOGLE_CLIENT_ID
    - name: GOOGLE_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GOOGLE_CLIENT_SECRET

  ingress:
    enabled: true
    className: traefik
    annotations: {}
    host: portal.example.com
    tls:
      enabled: false

postgresql:
  enabled: true
  auth:
    database: backstage
    username: postgres
