# Backstage Helm Values (Production)
# Upstream Chart: https://github.com/backstage/charts
#
# Notes:
# - Replace `portal.example.com` with your real domain.
# - Avoid using `latest` tags in production; pin an immutable tag.
#

backstage:
  replicas: 1

  image:
    registry: ghcr.io
    repository: joelnathan544/om-backstage
    tag: latest
    pullPolicy: Always
    pullSecrets:
      - ghcr-login

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  appConfig:
    app:
      title: OM Platform Portal
      baseUrl: http://backstage.local:30007

    backend:
      baseUrl: http://backstage.local:30007
      cors:
        origin: http://backstage.local:30007
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true

      database:
        client: pg
        connection:
          host: 10.43.223.94
          port: 5432
          user: postgres
          password: ${POSTGRES_PASSWORD}
          database: backstage

      # For a first prod cut, keep in-memory cache.
      # Recommended next step: deploy Redis and switch to `store: redis`.
      cache:
        store: memory

    auth:
      environment: development
      providers:
        google:
          development:
            clientId: ${GOOGLE_CLIENT_ID}
            clientSecret: ${GOOGLE_CLIENT_SECRET}
            signIn:
              resolvers: [] # Handled by custom code in index.ts

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location, Group, User, Template]
      providers:
        github:
          om-platform:
            organization: ${GITHUB_ORG}
            catalogPath: '/catalog-info.yaml'
            filters:
              repository: '.*'
            schedule:
              frequency: { minutes: 30 }
              timeout: { minutes: 3 }
      locations:
        - type: url
          target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/main/platform/portal/backstage/catalog/users.yaml
          rules:
            - allow: [Group, User]
        - type: url
          target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/main/platform/portal/backstage/catalog-info.yaml
          rules:
            - allow: [Component, Group, User]

    # Optional: wire these later once you have stable endpoints + credentials.
    # argocd:
    #   baseUrl: https://argocd.example.com
    # prometheus:
    #   proxyPath: /prometheus/api
    grafana:
      domain: https://grafana.example.com
      unifiedAlerting: false

    # Organization
    organization:
      name: OM Platform

  extraEnvVars:
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-postgresql
          key: postgres-password
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_TOKEN
    - name: GITHUB_ORG
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_ORG
    - name: GITHUB_REPO
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_REPO
    - name: GOOGLE_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GOOGLE_CLIENT_ID
    - name: GOOGLE_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GOOGLE_CLIENT_SECRET

service:
  type: NodePort
  nodePorts:
    backend: 30007

ingress:
  enabled: false

postgresql:
  enabled: true
  persistence:
    enabled: false
  auth:
    database: backstage
    username: postgres
    password: postgres
  primary:
    persistence:
      enabled: false
      size: 20Gi
