# Backstage Helm Values (Production)
# Upstream Chart: https://github.com/backstage/charts
#
# Notes:
# - Replace `portal.example.com` with your real domain.
# - Avoid using `latest` tags in production; pin an immutable tag.
#

backstage:
  replicas: 1

  image:
    registry: k3d-om-registry:5000
    repository: om-backstage
    tag: local
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  podLabels:
    backstage.io/kubernetes-id: backstage

  appConfig:
    app:
      title: OM Platform Portal
      baseUrl: https://portal.backstage.com

    backend:
      baseUrl: https://portal.backstage.com
      cors:
        origin: https://portal.backstage.com
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: backstage-postgresql
          port: 5432
          user: postgres
          password: ${POSTGRES_PASSWORD}
          database: backstage

      # For a first prod cut, keep in-memory cache.
      # Recommended next step: deploy Redis and switch to `store: redis`.
      cache:
        store: memory

    auth:
      environment: production
      providers:
        google:
          production:
            clientId: ${GOOGLE_CLIENT_ID}
            clientSecret: ${GOOGLE_CLIENT_SECRET}
            signIn:
              resolvers: [] # Handled by custom code in index.ts

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location, Group, User, Template]
      providers:
        github:
          om-platform:
            organization: ${GITHUB_ORG}
            catalogPath: '/catalog-info.yaml'
            filters:
              repository: '.*'
            schedule:
              frequency: { minutes: 30 }
              timeout: { minutes: 3 }
              initialDelay: { seconds: 30 }
          # Bootstrap users + templates from this repo (adjust org/repo + branch)
      locations:
        - type: url
          target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/${OM_GIT_REVISION}/platform/portal/backstage/catalog/users.yaml
          rules:
            - allow: [Group, User]
        - type: url
          target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/${OM_GIT_REVISION}/platform/portal/backstage/catalog-info.yaml
          rules:
            - allow: [Component, Group, User]
        - type: url
          target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/${OM_GIT_REVISION}/platform/portal/backstage/templates/new-application/template.yaml
          rules: [ { allow: [ Template ] } ]
        - type: url
          target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/${OM_GIT_REVISION}/platform/portal/backstage/templates/request-service/template.yaml
          rules: [ { allow: [ Template ] } ]
        - type: url
          target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/${OM_GIT_REVISION}/platform/portal/backstage/templates/team-onboarding/template.yaml
          rules: [ { allow: [ Template ] } ]

    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: local-cluster
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              serviceAccountToken: ${KUBERNETES_SA_TOKEN}
              skipTLSVerify: false
              caData: ""

    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: awsS3
        awsS3:
          bucketName: ${TECHDOCS_BUCKET_NAME}
          region: ${AWS_REGION}

    argocd:
      baseUrl: http://argocd-server.argocd.svc
      appDetailsMethods:
        - type: backstage

    # Optional: wire these later once you have stable endpoints + credentials.
    # argocd:
    #   baseUrl: https://argocd.example.com
    # prometheus:
    #   proxyPath: /prometheus/api
    grafana:
      domain: https://grafana.example.com
      unifiedAlerting: false

    # Organization
    organization:
      name: OM Platform

  extraEnvVars:
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: POSTGRES_PASSWORD
    - name: OM_GIT_REVISION
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: OM_GIT_REVISION
    - name: OM_GIT_REPO_URL
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: OM_GIT_REPO_URL
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_TOKEN
    - name: GITHUB_ORG
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_ORG
    - name: GITHUB_REPO
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_REPO
    - name: GOOGLE_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GOOGLE_CLIENT_ID
    - name: GOOGLE_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GOOGLE_CLIENT_SECRET
    - name: KUBERNETES_SA_TOKEN
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: KUBERNETES_SA_TOKEN
    - name: KUBERNETES_API_URL
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: KUBERNETES_API_URL
    - name: KUBERNETES_CA_DATA
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: KUBERNETES_CA_DATA
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: backstage-s3-auth
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: backstage-s3-auth
          key: AWS_SECRET_ACCESS_KEY
    - name: AWS_REGION
      valueFrom:
        secretKeyRef:
          name: backstage-s3-auth
          key: AWS_REGION
    - name: TECHDOCS_BUCKET_NAME
      valueFrom:
        secretKeyRef:
          name: backstage-s3-auth
          key: TECHDOCS_BUCKET_NAME

service:
  type: ClusterIP
  ports:
    backend: 7007
    name: http-backend

ingress:
  enabled: true
  className: traefik
  host: portal.backstage.com
  annotations: {}
  tls:
    enabled: true

postgresql:
  enabled: false

serviceAccount:
  create: false
  name: backstage
