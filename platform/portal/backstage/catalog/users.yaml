# Backstage Users (example)
# -----------------------------------------------------------------------------
# Google auth sign-in resolution in this repo is configured to map the signed-in
# user's email to a Backstage `User` entity:
#   auth.providers.google.*.signIn.resolvers: emailMatchingUserEntityProfileEmail
#
# Add one `User` per person who should be able to sign in with Google, and make
# sure `spec.profile.email` matches their Google account email exactly.
# -----------------------------------------------------------------------------

apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  description: Platform team
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: admin
spec:
  profile:
    displayName: Admin User
    email: admin@example.com
  memberOf: [platform-team]
