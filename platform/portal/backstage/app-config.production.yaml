app:
  baseUrl: https://portal.backstage.com
  title: OM Platform Portal
grafana:
  domain: https://grafana.example.com
  unifiedAlerting: false

auth:
  environment: production
  providers:
    google:
      production:
        clientId: ${GOOGLE_CLIENT_ID}
        clientSecret: ${GOOGLE_CLIENT_SECRET}
        signIn:
          resolvers: [] # Handled by custom code in index.ts

backend:
  baseUrl: https://portal.backstage.com
  cache:
    store: memory
  cors:
    credentials: true
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    origin: https://portal.backstage.com
  database:
    client: pg
    connection:
      database: backstage
      host: backstage-postgresql.backstage.svc.cluster.local
      password: ${POSTGRES_PASSWORD}
      port: 5432
      user: postgres

catalog:
  locations:
    - type: url
      target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/main/platform/portal/backstage/catalog/users.yaml
      rules: [{allow: [Group, User]}]
    - type: url
      target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/main/platform/portal/backstage/catalog-info.yaml
      rules: [{allow: [Component, Group, User]}]
    - type: url
      target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/main/platform/portal/backstage/templates/new-application/template.yaml
      rules: [{allow: [Template]}]
    - type: url
      target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/main/platform/portal/backstage/templates/request-service/template.yaml
      rules: [{allow: [Template]}]
    - type: url
      target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/main/platform/portal/backstage/templates/team-onboarding/template.yaml
      rules: [{allow: [Template]}]
  rules:
    - allow: [Component, System, API, Resource, Location, Group, User, Template]

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: local-cluster
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          serviceAccountToken: ${KUBERNETES_SA_TOKEN}
          skipTLSVerify: false
          caData: ""

techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

argocd:
  baseUrl: http://argocd-server.argocd.svc
  appDetailsMethods:
    - type: backstage

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

organization:
  name: OM Platform
