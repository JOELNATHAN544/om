apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: backstage
  description: OM Platform Developer Portal — self-service portal built on Backstage.
  annotations:
    # TechDocs — render documentation from the docs/ folder
    backstage.io/techdocs-ref: dir:.
    # Kubernetes plugin — show pods/deployments in the 'backstage' namespace
    backstage.io/kubernetes-id: backstage
    backstage.io/kubernetes-namespace: backstage
    # ArgoCD plugin — show sync status of the 'backstage' ArgoCD app
    argocd/app-name: backstage
    # GitHub Actions — show CI runs
    github.com/project-slug: JOELNATHAN544/om
  links:
    - url: https://portal.backstage.com
      title: Live Portal
      icon: web
spec:
  type: website
  owner: group:platform-team
  lifecycle: production

---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: guest
spec:
  profile:
    displayName: Guest User
    email: guest@example.com
    picture: https://avatars.dicebear.com/api/avataaars/guest.svg
  memberOf: [platform-team]

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  description: The team that maintains the platform
spec:
  type: team
  children: []
