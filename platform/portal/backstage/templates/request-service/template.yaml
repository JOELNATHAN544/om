# =============================================================================
# Request Platform Service Template
# =============================================================================
# Scaffolder template for requesting managed services from the catalog.
# =============================================================================

apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: request-service
  title: Request Platform Service
  description: |
    Request a managed service from the platform catalog:
    - PostgreSQL Database
    - Redis Cache
    - RabbitMQ Message Queue
    - And more...
  tags:
    - service
    - database
    - cache
    - infrastructure
spec:
  owner: group:platform-team
  type: resource

  # ==========================================================================
  # Input Parameters
  # ==========================================================================
  parameters:
    - title: Service Selection
      required:
        - serviceName
        - serviceType
        - size
      properties:
        serviceName:
          title: Service Name
          type: string
          description: Name for this service instance
          pattern: '^[a-z][a-z0-9-]{2,30}$'
          ui:autofocus: true

        serviceType:
          title: Service Type
          type: string
          description: Type of service to provision
          enum:
            - postgresql
            - redis
            - rabbitmq
            - mongodb
            - elasticsearch
          enumNames:
            - PostgreSQL (Relational Database)
            - Redis (Cache/Store)
            - RabbitMQ (Message Queue)
            - MongoDB (Document Database)
            - Elasticsearch (Search Engine)

        size:
          title: Size
          type: string
          description: Resource allocation tier
          enum:
            - small
            - medium
            - large
          enumNames:
            - Small (Dev/Test - $20-50/mo)
            - Medium (Staging/Low-traffic Prod - $100-200/mo)
            - Large (High-traffic Production - $400-800/mo)
          default: small

    - title: Configuration
      properties:
        environment:
          title: Environment
          type: string
          description: Target environment
          enum:
            - dev
            - staging
            - prod
          default: dev

        version:
          title: Version
          type: string
          description: Service version (leave empty for latest)

        customConfig:
          title: Custom Configuration
          type: object
          description: Additional configuration options
          properties:
            storage:
              title: Storage Size
              type: string
              description: Override default storage (e.g., 50Gi)
            highAvailability:
              title: High Availability
              type: boolean
              description: Enable HA mode (requires medium+ size)
              default: false

    - title: Ownership
      required:
        - owner
      properties:
        owner:
          title: Owner Team
          type: string
          description: Team that will own this service
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

        application:
          title: Application (Optional)
          type: string
          description: Application this service is for
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - Component

  # ==========================================================================
  # Execution Steps
  # ==========================================================================
  steps:
    # Step 1: Create GitHub issue for service request
    - id: create-service-issue
      name: Create Service Request Issue
      action: github:issues:create
      input:
        repoUrl: github.com?owner=JOELNATHAN544&repo=om
        title: 'Service Request: ${{ parameters.serviceType }} - ${{ parameters.serviceName }}'
        body: |
          ## Platform Service Request
          
          **Service Name:** ${{ parameters.serviceName }}
          **Service Type:** ${{ parameters.serviceType }}
          **Size:** ${{ parameters.size }}
          **Environment:** ${{ parameters.environment }}
          
          ### Configuration
          - **Version:** ${{ parameters.version || 'latest' }}
          - **Storage:** ${{ parameters.customConfig.storage || 'default' }}
          - **High Availability:** ${{ parameters.customConfig.highAvailability ? 'Yes' : 'No' }}
          
          ### Ownership
          - **Owner Team:** ${{ parameters.owner }}
          - **Application:** ${{ parameters.application || 'N/A' }}
          - **Requested By:** ${{ user.entity.metadata.name }}
          
          ---
          
          ### Action Items
          - [ ] Validate team quota
          - [ ] Provision ${{ parameters.serviceType }} instance
          - [ ] Create connection secret in namespace `${{ parameters.owner | replace('group:', '') }}-${{ parameters.environment }}`
          - [ ] Register resource in Backstage catalog
          - [ ] Notify requester
          
          /label service-request
          /label ${{ parameters.serviceType }}
          /label ${{ parameters.environment }}
        labels:
          - service-request
          - ${{ parameters.serviceType }}
          - ${{ parameters.environment }}

  # ==========================================================================
  # Output
  # ==========================================================================
  output:
    links:
      - title: View Service Request Issue
        url: ${{ steps['create-service-issue'].output.issueUrl }}
        icon: github
    text:
      - title: Service Request Submitted
        content: |
          ## Service Request Created
          
          **Service**: ${{ parameters.serviceType }}
          **Name**: ${{ parameters.serviceName }}
          **Size**: ${{ parameters.size }}
          **Environment**: ${{ parameters.environment }}
          
          ${{ parameters.environment === 'prod' ? '⚠️ **Production services require approval.** The platform team will review your request and provision the service.' : '✅ **Development services** are typically auto-approved and provisioned within 15-30 minutes.' }}
          
          ### What Happens Next?
          
          1. Platform team reviews the request
          2. Service is provisioned in your namespace
          3. Connection credentials are stored in a Kubernetes secret
          4. You'll be notified when the service is ready
          
          ### Connection Details (After Provisioning)
          
          - **Secret Name**: `${{ parameters.serviceName }}-credentials`
          - **Namespace**: `${{ parameters.owner | replace('group:', '') }}-${{ parameters.environment }}`
          
          Track progress in the [service request issue](${{ steps['create-service-issue'].output.issueUrl }})
