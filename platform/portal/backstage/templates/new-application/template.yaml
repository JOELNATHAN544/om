# =============================================================================
# New Application Template
# =============================================================================
# Scaffolder template for creating new applications on the OM Platform.
# =============================================================================

apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-application
  title: Create New Application
  description: |
    Bootstrap a new application with:
    - GitHub repository with CI/CD
    - Helm deployment configuration
    - ArgoCD application
    - Monitoring and alerting
  tags:
    - recommended
    - application
    - kubernetes
spec:
  owner: group:platform-team
  type: service

  # ==========================================================================
  # Input Parameters
  # ==========================================================================
  parameters:
    # Step 1: Basic Information
    - title: Application Information
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for your application (lowercase, alphanumeric)
          pattern: '^[a-z][a-z0-9-]{2,30}$'
          ui:autofocus: true
          ui:help: 'Must start with letter, only lowercase letters, numbers, and hyphens'

        description:
          title: Description
          type: string
          description: Brief description of what this application does

        owner:
          title: Owner Team
          type: string
          description: Team that owns this application
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

    # Step 2: Technical Configuration
    - title: Technical Configuration
      required:
        - language
      properties:
        language:
          title: Programming Language
          type: string
          description: Primary programming language
          enum:
            - go
            - python
            - nodejs
            - java
          enumNames:
            - Go
            - Python
            - Node.js
            - Java
          default: go

        framework:
          title: Framework
          type: string
          description: Application framework (optional)
          enum:
            - none
            - gin
            - echo
            - fastapi
            - flask
            - express
            - nestjs
            - spring-boot
          default: none

        database:
          title: Database
          type: string
          description: Database requirement
          enum:
            - none
            - postgresql
            - mongodb
          enumNames:
            - None
            - PostgreSQL
            - MongoDB
          default: none

        cache:
          title: Cache
          type: string
          description: Cache requirement
          enum:
            - none
            - redis
          enumNames:
            - None
            - Redis
          default: none

    # Step 3: Deployment Configuration
    - title: Deployment Configuration
      properties:
        environments:
          title: Environments
          type: array
          description: Environments to deploy to
          items:
            type: string
            enum:
              - dev
              - staging
              - prod
          uniqueItems: true
          default:
            - dev

        replicas:
          title: Initial Replicas
          type: integer
          description: Number of replicas per environment
          minimum: 1
          maximum: 10
          default: 2

        port:
          title: Application Port
          type: integer
          description: Port your application listens on
          default: 8080

        healthPath:
          title: Health Check Path
          type: string
          description: HTTP path for health checks
          default: /health

    # Step 4: Repository
    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - JOELNATHAN544

  # ==========================================================================
  # Execution Steps
  # ==========================================================================
  steps:
    # Step 1: Create basic catalog-info.yaml
    - id: fetch-base
      name: Fetch Application Template
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          language: ${{ parameters.language }}
          framework: ${{ parameters.framework }}
          port: ${{ parameters.port }}
          healthPath: ${{ parameters.healthPath }}
          database: ${{ parameters.database }}
          cache: ${{ parameters.cache }}

    # Step 2: Create GitHub repository
    - id: publish-github
      name: Create GitHub Repository
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: internal
        protectDefaultBranch: false

    # Step 3: Register in catalog
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  # ==========================================================================
  # Output
  # ==========================================================================
  output:
    links:
      - title: Open Repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
        icon: github
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Next Steps
        content: |
          ## Your application has been created!

          1. **Clone the repository**: ${{ steps['publish-github'].output.remoteUrl }}
          2. **Add your application code**: Start building your ${{ parameters.language }} application
          3. **Set up CI/CD**: Add GitHub Actions workflows for build and deploy
          4. **Deploy to Kubernetes**: Use the base-app Helm chart for deployment

          Need help? Check the [Getting Started Guide](/docs/default/component/getting-started)
