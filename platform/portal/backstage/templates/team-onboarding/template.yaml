apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboard-team
  title: Onboard New Team
  description: Request platform access for a new team
spec:
  owner: platform-team
  type: team

  parameters:
    - title: Team Information
      required:
        - teamName
        - owner
        - costCenter
      properties:
        teamName:
          title: Team Name
          type: string
          pattern: '^[a-z][a-z0-9-]{2,20}$'
        displayName:
          title: Display Name
          type: string
        owner:
          title: Team Lead Email
          type: string
          format: email
        costCenter:
          title: Cost Center
          type: string

    - title: Subscription
      properties:
        tier:
          title: Resource Tier
          type: string
          enum: [starter, standard, enterprise]
          default: starter
        environments:
          title: Environments
          type: array
          items:
            type: string
            enum: [dev, staging, prod]
          default: [dev]

    - title: Team Members
      properties:
        members:
          title: Team Members
          type: array
          items:
            type: object
            properties:
              email:
                type: string
                format: email
              role:
                type: string
                enum: [admin, developer, viewer]

  steps:
    - id: create-tenant
      name: Create Tenant
      action: kubernetes:create
      input:
        apiVersion: platform.om.io/v1alpha1
        kind: Tenant
        metadata:
          name: ${{ parameters.teamName }}
        spec:
          name: ${{ parameters.teamName }}
          displayName: ${{ parameters.displayName }}
          owner: ${{ parameters.owner }}
          tier: ${{ parameters.tier }}
          environments: ${{ parameters.environments }}
          costCenter: ${{ parameters.costCenter }}
          members: ${{ parameters.members }}

    - id: create-group
      name: Create Backstage Group
      action: catalog:register
      input:
        catalogInfoPath: |
          apiVersion: backstage.io/v1alpha1
          kind: Group
          metadata:
            name: ${{ parameters.teamName }}
          spec:
            type: team
            children: []
            members: ${{ parameters.members | map(m => m.email) }}

  output:
    links:
      - title: View Team
        url: /catalog/default/group/${{ parameters.teamName }}
