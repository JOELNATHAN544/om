apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboard-team
  title: Onboard New Team
  description: Request platform access for a new team
spec:
  owner: platform-team
  type: team

  parameters:
    - title: Team Information
      required:
        - teamName
        - owner
        - costCenter
      properties:
        teamName:
          title: Team Name
          type: string
          pattern: '^[a-z][a-z0-9-]{2,20}$'
        displayName:
          title: Display Name
          type: string
        owner:
          title: Team Lead Email
          type: string
          format: email
        costCenter:
          title: Cost Center
          type: string

    - title: Subscription
      properties:
        tier:
          title: Resource Tier
          type: string
          enum: [starter, standard, enterprise]
          default: starter
        environments:
          title: Environments
          type: array
          items:
            type: string
            enum: [dev, staging, prod]
          default: [dev]

    - title: Team Members
      properties:
        members:
          title: Team Members
          type: array
          items:
            type: object
            properties:
              email:
                type: string
                format: email
              role:
                type: string
                enum: [admin, developer, viewer]

  steps:
    - id: create-github-issue
      name: Create Onboarding Issue
      action: github:issues:create
      input:
        repoUrl: github.com?owner=JOELNATHAN544&repo=om
        title: 'Team Onboarding: ${{ parameters.displayName || parameters.teamName }}'
        body: |
          ## Team Onboarding Request
          
          **Team Name:** ${{ parameters.teamName }}
          **Display Name:** ${{ parameters.displayName || parameters.teamName }}
          **Team Lead:** ${{ parameters.owner }}
          **Cost Center:** ${{ parameters.costCenter }}
          
          ### Subscription Details
          - **Tier:** ${{ parameters.tier }}
          - **Environments:** ${{ parameters.environments | join(', ') }}
          
          ### Team Members
          {% for member in parameters.members %}
          - {{ member.email }} ({{ member.role }})
          {% endfor %}
          
          ---
          
          ### Action Items
          - [ ] Create namespaces for environments
          - [ ] Set up RBAC and service accounts
          - [ ] Create ArgoCD project
          - [ ] Add team to Backstage catalog
          - [ ] Configure resource quotas based on tier
          - [ ] Send welcome email to team lead
          
          /label team-onboarding
          /label ${{ parameters.tier }}
        labels:
          - team-onboarding
          - ${{ parameters.tier }}

    - id: create-group-file
      name: Create Team Group File
      action: fetch:template
      input:
        url: ./content
        values:
          teamName: ${{ parameters.teamName }}
          displayName: ${{ parameters.displayName || parameters.teamName }}
          owner: ${{ parameters.owner }}
          members: ${{ parameters.members }}

    - id: publish-group
      name: Create PR with Team Group
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=JOELNATHAN544&repo=om
        branchName: team-${{ parameters.teamName }}
        title: 'feat: add team ${{ parameters.displayName || parameters.teamName }}'
        description: |
          ## Add Team to Catalog
          
          This PR adds the **${{ parameters.displayName || parameters.teamName }}** team to the Backstage catalog.
          
          **Team Lead:** ${{ parameters.owner }}
          **Cost Center:** ${{ parameters.costCenter }}
          
          Related issue: Will be created automatically
        targetPath: platform/portal/backstage/catalog/teams
        sourcePath: .

  output:
    links:
      - title: View Onboarding Issue
        url: ${{ steps['create-github-issue'].output.issueUrl }}
        icon: github
      - title: View Team PR
        url: ${{ steps['publish-group'].output.remoteUrl }}
        icon: github
    text:
      - title: Next Steps
        content: |
          ## Team Onboarding Initiated!
          
          Your team onboarding request has been submitted. The platform team will:
          
          1. Review the onboarding issue
          2. Create the necessary infrastructure (namespaces, RBAC, etc.)
          3. Merge the team catalog PR
          4. Notify you when onboarding is complete
          
          **Estimated time:** 1-2 business days
          
          Track progress in the [onboarding issue](${{ steps['create-github-issue'].output.issueUrl }})
