# =============================================================================
# cert-manager Cluster Issuers
# =============================================================================
# Define certificate issuers for TLS certificate management.
# =============================================================================

# Self-Signed Issuer (for internal services)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
  labels:
    app.kubernetes.io/part-of: om-platform
spec:
  selfSigned: {}

---
# CA Issuer (for internal PKI)
# First, create a self-signed root CA
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: platform-ca
  secretName: platform-ca-key-pair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
# CA Issuer using the root CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: platform-ca-issuer
  labels:
    app.kubernetes.io/part-of: om-platform
spec:
  ca:
    secretName: platform-ca-key-pair
